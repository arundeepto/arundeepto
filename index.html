    function renderStudents(filter = "") {
        const container = document.getElementById('studentContainer');
        const access = localStorage.getItem('accessLevel');
        container.innerHTML = "";
        
        students.filter(s => s.name.toLowerCase().includes(filter.toLowerCase())).forEach(s => {
            const isCR = (access === 'verified');
            // মোবাইল নাম্বারের প্রথম ৫ ডিজিট দেখাবে, বাকিটা CR লগইন ছাড়া হাইড থাকবে
            const displayPhone = isCR ? s.mobile : s.mobile.substring(0, 5) + "XXXXXX";
            
            container.innerHTML += `
                <div class="col-lg-4 col-md-6 mb-4">
                    <div class="card student-card h-100 p-4">
                        <div class="d-flex justify-content-between mb-2">
                            <span class="badge bg-primary">Roll: ${s.roll}</span>
                            <span class="badge bg-danger">${s.bloodGroup}</span>
                        </div>
                        <h5 class="fw-bold mb-3">${s.name}</h5>
                        <p class="mb-1 small"><i class="fas fa-calendar-alt me-2 text-secondary"></i><b>HSC Batch:</b> ${s.hscBatch}</p>
                        <p class="mb-1 small"><i class="fas fa-phone me-2 text-primary"></i><b>Phone:</b> ${displayPhone}</p>
                        <p class="mb-1 small"><i class="fas fa-map-marker-alt me-2 text-danger"></i><b>Address:</b> ${s.address}</p>
                        <p class="small text-muted mt-2"><i class="fas fa-graduation-cap me-2"></i>${s.exCollege}</p>
                    </div>
                </div>
            `;
        });
    }

    function adminLogin() {
        const pass = document.getElementById('adminPass').value;
        if (pass === "cr6662") {
            localStorage.setItem('accessLevel', 'verified');
            document.getElementById('loginBtn').innerText = "CR Logged In";
            renderStudents();
        } else {
            alert("Wrong Code!");
        }
    }

    // পেজ লোড হওয়ার সময় লগইন চেক করা
    window.onload = () => {
        if(localStorage.getItem('accessLevel') === 'verified') {
            document.getElementById('loginBtn').innerText = "CR Logged In";
        }
        renderStudents();
    };

    document.getElementById('searchInput').addEventListener('input', (e) => renderStudents(e.target.value));
